# Production — déploiement sur VM avec sous-domaine propre.
#
# Architecture :
#   Internet → Caddy (80/443, TLS Let's Encrypt auto)
#               ├── /api/*  → api:8000  (FastAPI)
#               └── /*      → frontend:80 (nginx, fichiers statiques)
#
# La base, l'API et le frontend n'ont AUCUN port exposé publiquement.
# Seul Caddy répond sur 80/443.
#
# Pré-requis sur la VM :
#   - Ports 80 et 443 ouverts (firewall)
#   - Enregistrement DNS A : log.bpmclubsono.com → IP de la VM
#
# Lancer :
#   docker compose -f docker-compose.prod.yml --env-file .env up -d --build

services:
  db:
    image: postgres:16-alpine
    container_name: bpm_log_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-bpm_log}
    # Pas de `ports:` → la base n'est accessible que depuis le réseau Docker interne.
    volumes:
      - bpm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-bpm_log}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bpm_log_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-bpm_log}
    # Pas de `ports:` → joignable uniquement par Caddy via le réseau Docker interne.
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - bpm_photos:/var/bpm/photos
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bpm_log_frontend
    restart: unless-stopped
    # Pas de `ports:` → servi par Caddy via le réseau Docker interne.
    depends_on:
      - api
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    container_name: bpm_log_caddy
    restart: unless-stopped
    ports:
      - "80:80"    # Requis pour le challenge ACME HTTP-01 (renouvellement Let's Encrypt).
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data        # Certificats TLS (persistés entre redémarrages).
      - caddy_config:/config
    depends_on:
      - frontend
      - api

volumes:
  bpm_pgdata:
  bpm_photos:
  caddy_data:
  caddy_config:

  bpm_pgdata:
  bpm_photos:
