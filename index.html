<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPM Log - Proof of Concept</title>
    <!-- Google Fonts: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        outfit: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        bpm: {
                            base: '#0c071a',
                            surface: '#150e2d',
                            accent: '#8b5cf6',
                            neon: '#c084fc',
                            green: '#10b981',
                            red: '#ef4444',
                            glow: 'rgba(139, 92, 246, 0.15)'
                        }
                    }
                }
            }
        }
    </script>
    <style type="text/css">
        body {
            background-color: #0c071a;
            color: #f3f4f6;
            overflow-x: hidden;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0c071a;
        }
        ::-webkit-scrollbar-thumb {
            background: #2d1c5c;
            border-radius: 3px;
        }
        /* Laser line scanning animation */
        @keyframes laser {
            0%, 100% { top: 0%; opacity: 0.8; }
            50% { top: 100%; opacity: 0.8; }
        }
        .laser-line {
            animation: laser 2.5s infinite ease-in-out;
        }
        /* Glassmorphism utility */
        .glass {
            background: rgba(21, 14, 45, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .glow-neon {
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.4);
        }
    </style>

    <!-- React, ReactDOM & Babel for JSX -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Dexie.js for IndexedDB -->
    <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.js"></script>

    <!-- html5-qrcode for live camera scan -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@0.244.0"></script>
</head>
<body class="font-sans antialiased min-h-screen flex flex-col items-center justify-center p-0 sm:p-4 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-indigo-950 via-bpm-base to-bpm-base">

    <!-- Container standard simulant un smartphone -->
    <div id="root" class="w-full max-w-md min-h-screen sm:min-h-[850px] sm:max-h-[850px] bg-bpm-base sm:rounded-3xl sm:shadow-[0_0_50px_rgba(0,0,0,0.8)] border-0 sm:border border-indigo-950/50 flex flex-col overflow-hidden relative"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- INITIALISATION DE LA BASE DE DONNÉES LOCALE (DEXIE.JS) ---
        const db = new Dexie("BpmLogLocalDB");
        db.version(1).stores({
            equipment: 'id, name, category, status, type, isBulk',
            sync_queue: 'id, equipment_id, action, timestamp, details, offline_created_at',
            synced_movements: 'id, equipment_id, action, timestamp, details, offline_created_at'
        });

        // Seed initial pour faire fonctionner le POC immédiatement
        async function seedDatabase() {
            const count = await db.equipment.count();
            if (count === 0) {
                await db.equipment.bulkAdd([
                    { id: "BPM-EQ-001", name: "Lyre Beam Spot Wash 150W", category: "Lumières", status: "Disponible", type: "Individuel", isBulk: false },
                    { id: "BPM-EQ-002", name: "Amplificateur de Puissance Crown 2x600W", category: "Sonorisation", status: "Disponible", type: "Individuel", isBulk: false },
                    { id: "BPM-EQ-003", name: "Console Numérique Behringer X32", category: "Sonorisation", status: "En Réparation", type: "Individuel", isBulk: false },
                    { id: "BPM-EQ-004", name: "Pied de Structure Aluminium renforcé", category: "Structure", status: "Stocké", type: "Individuel", isBulk: false },
                    { id: "BPM-BOX-XLR", name: "Caisse Vrac - Câblerie Fine XLR", category: "Câblage", status: "Disponible", type: "Vrac", isBulk: true },
                    { id: "BPM-BOX-POW", name: "Caisse Vrac - Adaptateurs & Alim", category: "Câblage", status: "Disponible", type: "Vrac", isBulk: true }
                ]);
                console.log("Database seeded successfully!");
            }
        }
        seedDatabase();

        // Contenu théorique par défaut pour les caisses de vrac
        const defaultBulkContents = {
            "BPM-BOX-XLR": [
                { id: "xlr-10m", name: "Câble XLR M/F - 10m", expected: 12, actual: 12 },
                { id: "xlr-5m", name: "Câble XLR M/F - 5m", expected: 20, actual: 20 },
                { id: "xlr-2m", name: "Câble XLR M/F - 2m", expected: 10, actual: 10 },
                { id: "jack-xlr", name: "Adaptateur Jack vers XLR M", expected: 4, actual: 4 }
            ],
            "BPM-BOX-POW": [
                { id: "pc-1.5m", name: "Câble Shuko / Powercon - 1.5m", expected: 8, actual: 8 },
                { id: "pc-5m", name: "Câble Shuko / Powercon - 5m", expected: 4, actual: 4 },
                { id: "triplette", name: "Multiprise 3 plots (Triplette)", expected: 6, actual: 6 },
                { id: "iec-1.5m", name: "Câble Alimentation standard IEC", expected: 10, actual: 10 }
            ]
        };

        // --- COMPOSANT PRINCIPAL ---
        function App() {
            const [activeTab, setActiveTab] = useState("scan"); // "scan" | "queue" | "inventory"
            const [isOnline, setIsOnline] = useState(true);
            const [syncQueueCount, setSyncQueueCount] = useState(0);
            const [syncQueue, setSyncQueue] = useState([]);
            const [syncedHistory, setSyncedHistory] = useState([]);
            const [equipmentList, setEquipmentList] = useState([]);
            const [isSyncing, setIsSyncing] = useState(false);
            
            // État pour la sélection manuelle de QR (simulateur)
            const [selectedMockQR, setSelectedMockQR] = useState("");
            
            // États pour la caisse de vrac / Checklist
            const [currentBulkBox, setCurrentBulkBox] = useState(null);
            const [bulkChecklist, setBulkChecklist] = useState([]);
            const [selectedAction, setSelectedAction] = useState("SORTIE"); // "SORTIE" (Checkout) ou "ENTRÉE" (Checkin)

            // État caméra réelle
            const [isCameraActive, setIsCameraActive] = useState(false);
            const html5QrCodeRef = useRef(null);

            // Charger les données IndexedDB
            const refreshData = async () => {
                const queue = await db.sync_queue.toArray();
                setSyncQueue(queue);
                setSyncQueueCount(queue.length);

                const history = await db.synced_movements.toArray();
                setSyncedHistory(history.reverse()); // Plus récent en premier

                const equip = await db.equipment.toArray();
                setEquipmentList(equip);
            };

            useEffect(() => {
                refreshData();
                
                // Écouteur réseau natif
                const handleOnlineStatus = () => setIsOnline(navigator.onLine);
                window.addEventListener("online", handleOnlineStatus);
                window.addEventListener("offline", handleOnlineStatus);
                
                return () => {
                    window.removeEventListener("online", handleOnlineStatus);
                    window.removeEventListener("offline", handleOnlineStatus);
                    if (html5QrCodeRef.current) {
                        html5QrCodeRef.current.stop().catch(err => console.log(err));
                    }
                };
            }, []);

            // Déclencher une vibration haptique si supportée
            const triggerHaptics = (pattern = 100) => {
                if (navigator.vibrate) {
                    navigator.vibrate(pattern);
                }
            };

            // Activer / Désactiver la caméra réelle via html5-qrcode
            const toggleCamera = () => {
                if (isCameraActive) {
                    stopCamera();
                } else {
                    startCamera();
                }
            };

            const startCamera = () => {
                setIsCameraActive(true);
                setTimeout(() => {
                    try {
                        const html5QrCode = new Html5Qrcode("reader");
                        html5QrCodeRef.current = html5QrCode;
                        
                        const config = { 
                            fps: 10, 
                            qrbox: { width: 230, height: 230 },
                            aspectRatio: 1.0
                        };
                        
                        html5QrCode.start(
                            { facingMode: "environment" }, 
                            config, 
                            (decodedText) => {
                                handleDecodedQR(decodedText);
                                stopCamera();
                            },
                            (errorMessage) => {
                                // Erreur de frame, ignorer silencieusement pour éviter de polluer les logs
                            }
                        ).catch(err => {
                            console.error("Camera access failed", err);
                            setIsCameraActive(false);
                            alert("Impossible d'accéder à la caméra arrière. Utilisez le simulateur ci-dessous !");
                        });
                    } catch (err) {
                        console.error("Reader initialization error", err);
                        setIsCameraActive(false);
                    }
                }, 300);
            };

            const stopCamera = () => {
                if (html5QrCodeRef.current) {
                    html5QrCodeRef.current.stop().then(() => {
                        setIsCameraActive(false);
                        html5QrCodeRef.current = null;
                    }).catch(err => {
                        console.error("Error stopping reader", err);
                        setIsCameraActive(false);
                    });
                } else {
                    setIsCameraActive(false);
                }
            };

            // Traitement du QR Code décodé
            const handleDecodedQR = async (qrCode) => {
                triggerHaptics([80, 50, 80]);
                
                // Recherche de l'équipement correspondant
                const item = await db.equipment.get(qrCode);
                
                if (!item) {
                    alert(`QR Code inconnu au bataillon : "${qrCode}"`);
                    return;
                }

                if (item.isBulk) {
                    // C'est une caisse de vrac ! Ouvrir la check-list
                    setCurrentBulkBox(item);
                    // Copier le contenu par défaut ou charger l'historique
                    const initialContent = defaultBulkContents[item.id] || [];
                    setBulkChecklist(initialContent.map(i => ({ ...i })));
                } else {
                    // Équipement individuel standard
                    await addMovementToQueue(item, selectedAction, { type: "individuel" });
                }
            };

            // Enregistrer un mouvement en local dans la file d'attente (IndexedDB)
            const addMovementToQueue = async (equipment, action, details) => {
                const uuid = 'mv-' + Math.random().toString(36).substring(2, 11);
                
                const newMovement = {
                    id: uuid,
                    equipment_id: equipment.id,
                    action: action,
                    timestamp: new Date().toISOString(),
                    details: JSON.stringify(details),
                    offline_created_at: new Date().toISOString()
                };

                await db.sync_queue.add(newMovement);
                
                // Notif de terrain rapide
                showBannerNotification(`Matériel enregistré (${action}) !`);
                refreshData();

                // Si on est en ligne, lancer une synchronisation automatique en tâche de fond
                if (isOnline) {
                    triggerSync();
                }
            };

            // Notification visuelle éphémère style iOS
            const [notificationMessage, setNotificationMessage] = useState("");
            const showBannerNotification = (msg) => {
                setNotificationMessage(msg);
                setTimeout(() => {
                    setNotificationMessage("");
                }, 3000);
            };

            // Synchronisation de la file IndexedDB vers le serveur (simulée avec timer et visuels premium)
            const triggerSync = async () => {
                if (isSyncing || syncQueueCount === 0) return;
                setIsSyncing(true);
                
                // Petite temporisation pour simuler la latence réseau et les animations
                setTimeout(async () => {
                    try {
                        const queue = await db.sync_queue.toArray();
                        
                        // Nous simulons l'envoi de chaque élément au serveur backend PostgreSQL
                        for (let movement of queue) {
                            // Insertion dans l'historique synchronisé sur le client
                            await db.synced_movements.add({
                                id: movement.id,
                                equipment_id: movement.equipment_id,
                                action: movement.action,
                                timestamp: movement.timestamp,
                                details: movement.details,
                                offline_created_at: movement.offline_created_at
                            });
                            
                            // Mettre à jour le statut de l'équipement dans IndexedDB local (miroir du serveur)
                            const item = await db.equipment.get(movement.equipment_id);
                            if (item) {
                                let newStatus = "Disponible";
                                if (movement.action === "SORTIE") {
                                    newStatus = "Sorti / En Service";
                                } else if (movement.action === "PANNE") {
                                    newStatus = "En Réparation";
                                }
                                await db.equipment.update(movement.equipment_id, { status: newStatus });
                            }

                            // Suppression de la file locale d'attente
                            await db.sync_queue.delete(movement.id);
                        }

                        triggerHaptics([50, 50, 150]);
                        showBannerNotification("Synchronisation terminée avec succès !");
                    } catch (e) {
                        console.error("Sync failed", e);
                        showBannerNotification("Échec de synchronisation. En attente de réseau.");
                    } finally {
                        setIsSyncing(false);
                        refreshData();
                    }
                }, 1500);
            };

            // Gestion de l'ajustement du vrac/checklist
            const adjustQty = (id, delta) => {
                setBulkChecklist(prev => prev.map(item => {
                    if (item.id === id) {
                        const newQty = Math.max(0, item.actual + delta);
                        return { ...item, actual: newQty };
                    }
                    return item;
                }));
            };

            // Validation de la checklist de vrac
            const submitBulkChecklist = async () => {
                if (!currentBulkBox) return;
                
                await addMovementToQueue(currentBulkBox, selectedAction, {
                    type: "vrac",
                    contents: bulkChecklist
                });
                
                setCurrentBulkBox(null);
            };

            return (
                <div class="flex-1 flex flex-col h-full overflow-hidden text-slate-200">
                    
                    {/* Barmètre iOS Notification */}
                    {notificationMessage && (
                        <div class="absolute top-16 left-4 right-4 z-50 glass border-bpm-accent/50 rounded-2xl p-4 shadow-xl flex items-center justify-between animate-bounce transition-all duration-300">
                            <div class="flex items-center gap-3">
                                <span class="w-2.5 h-2.5 rounded-full bg-bpm-accent animate-ping"></span>
                                <span class="font-medium text-sm text-purple-200">{notificationMessage}</span>
                            </div>
                            <i data-lucide="info" class="w-5 h-5 text-bpm-accent"></i>
                        </div>
                    )}

                    {/* TOP BAR / BRANDING */}
                    <header class="p-4 border-b border-indigo-950/40 bg-bpm-surface/60 flex items-center justify-between shrink-0">
                        <div class="flex items-center gap-2.5">
                            <div class="w-9 h-9 rounded-xl bg-gradient-to-tr from-bpm-accent to-bpm-neon flex items-center justify-center font-bold text-white shadow-md shadow-bpm-accent/20 font-outfit text-lg">
                                B
                            </div>
                            <div>
                                <h1 class="font-semibold text-base font-outfit leading-tight tracking-wide bg-gradient-to-r from-white to-purple-200 bg-clip-text text-transparent">BPM LOG</h1>
                                <span class="text-[10px] text-slate-500 font-medium">Logistique & Parc Matériel</span>
                            </div>
                        </div>

                        {/* Simulateur de connexion réseau */}
                        <button 
                            onClick={() => {
                                setIsOnline(!isOnline);
                                triggerHaptics(60);
                                showBannerNotification(isOnline ? "Mode Hors-Ligne activé !" : "Connexion réseau rétablie !");
                            }}
                            class={`flex items-center gap-2 px-3 py-1.5 rounded-full border text-xs font-semibold tracking-wider transition-all duration-300 ${
                                isOnline 
                                ? 'bg-emerald-500/10 border-emerald-500/20 text-emerald-400' 
                                : 'bg-red-500/10 border-red-500/20 text-red-400'
                            }`}
                        >
                            <span class={`w-2 h-2 rounded-full ${isOnline ? 'bg-emerald-400 animate-pulse' : 'bg-red-400 animate-ping'}`}></span>
                            {isOnline ? 'EN LIGNE' : 'HORS LIGNE'}
                        </button>
                    </header>

                    {/* MAIN CONTENT AREA */}
                    <main class="flex-1 overflow-y-auto p-4 flex flex-col relative">
                        
                        {/* TAB 1: SCANNER */}
                        {activeTab === "scan" && (
                            <div class="flex-1 flex flex-col justify-between gap-4">
                                
                                {/* Sélecteur de type d'action (Sortie / Entrée / Panne) */}
                                <div class="grid grid-cols-3 gap-2 bg-bpm-surface/40 p-1 rounded-xl border border-indigo-950/20 shrink-0">
                                    <button 
                                        onClick={() => { setSelectedAction("SORTIE"); triggerHaptics(30); }}
                                        class={`py-2 rounded-lg text-xs font-bold transition-all duration-200 ${
                                            selectedAction === "SORTIE" 
                                            ? 'bg-bpm-accent text-white shadow-md shadow-bpm-accent/10' 
                                            : 'text-slate-400 hover:text-white'
                                        }`}
                                    >
                                        SORTIE
                                    </button>
                                    <button 
                                        onClick={() => { setSelectedAction("ENTRÉE"); triggerHaptics(30); }}
                                        class={`py-2 rounded-lg text-xs font-bold transition-all duration-200 ${
                                            selectedAction === "ENTRÉE" 
                                            ? 'bg-bpm-green/80 text-white shadow-md shadow-bpm-green/10' 
                                            : 'text-slate-400 hover:text-white'
                                        }`}
                                    >
                                        RETOUR
                                    </button>
                                    <button 
                                        onClick={() => { setSelectedAction("PANNE"); triggerHaptics(30); }}
                                        class={`py-2 rounded-lg text-xs font-bold transition-all duration-200 ${
                                            selectedAction === "PANNE" 
                                            ? 'bg-bpm-red/80 text-white shadow-md shadow-bpm-red/10' 
                                            : 'text-slate-400 hover:text-white'
                                        }`}
                                    >
                                        SIGNALER PANNE
                                    </button>
                                </div>

                                {/* SCANNER CAMERA VIEWPORT */}
                                <div class="flex-1 flex flex-col justify-center items-center py-2 shrink-0">
                                    <div class="relative w-full max-w-[280px] aspect-square rounded-3xl overflow-hidden bg-bpm-surface border border-indigo-950/60 shadow-[inset_0_0_20px_rgba(0,0,0,0.6)] flex items-center justify-center">
                                        {isCameraActive ? (
                                            <div id="reader" class="w-full h-full object-cover"></div>
                                        ) : (
                                            <div class="flex flex-col items-center p-6 text-center text-slate-500">
                                                <div class="w-16 h-16 rounded-full bg-indigo-950/30 flex items-center justify-center mb-3">
                                                    <svg class="w-8 h-8 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v1m0 11v1m9-6h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m12.728 12.728l-.707.707M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                                </div>
                                                <p class="text-xs font-medium max-w-[200px]">Caméra inactive</p>
                                                <p class="text-[10px] text-slate-600 mt-1">Activez l'appareil photo ou utilisez le simulateur ci-dessous pour tester</p>
                                            </div>
                                        )}

                                        {/* Scanner Viewfinder Overlay */}
                                        <div class="absolute inset-5 border-2 border-dashed border-bpm-accent/30 rounded-2xl pointer-events-none flex items-center justify-center">
                                            {/* Neon corners */}
                                            <div class="absolute top-0 left-0 w-4 h-4 border-t-4 border-l-4 border-bpm-neon rounded-tl-md"></div>
                                            <div class="absolute top-0 right-0 w-4 h-4 border-t-4 border-r-4 border-bpm-neon rounded-tr-md"></div>
                                            <div class="absolute bottom-0 left-0 w-4 h-4 border-b-4 border-l-4 border-bpm-neon rounded-bl-md"></div>
                                            <div class="absolute bottom-0 right-0 w-4 h-4 border-b-4 border-r-4 border-bpm-neon rounded-br-md"></div>
                                            
                                            {/* Laser scan animation */}
                                            {isCameraActive && <div class="absolute left-1/10 right-1/10 h-0.5 bg-gradient-to-r from-transparent via-bpm-neon to-transparent shadow-[0_0_10px_#c084fc] laser-line"></div>}
                                        </div>
                                    </div>

                                    {/* Action de la Caméra */}
                                    <button 
                                        onClick={() => { triggerHaptics(40); toggleCamera(); }}
                                        class={`mt-4 px-6 py-2.5 rounded-full font-semibold text-xs tracking-wider transition-all duration-300 flex items-center gap-2 ${
                                            isCameraActive 
                                            ? 'bg-bpm-red/20 border border-bpm-red/30 text-bpm-red' 
                                            : 'bg-bpm-accent hover:bg-purple-600 text-white glow-neon shadow-lg shadow-bpm-accent/30'
                                        }`}
                                    >
                                        <span class="w-2.5 h-2.5 rounded-full bg-current animate-pulse"></span>
                                        {isCameraActive ? "ARRÊTER LA CAMÉRA" : "DÉMARRER LA CAMÉRA REELLE"}
                                    </button>
                                </div>

                                {/* SCAN SIMULATOR FOR MOBILE COMFORT / DESKTOP TESTING */}
                                <div class="glass rounded-2xl p-4 border border-indigo-950/40">
                                    <h3 class="text-xs font-bold text-slate-400 mb-2 flex items-center gap-1.5 uppercase tracking-wide">
                                        <span>🛠️ Simulateur QR Code BPM</span>
                                    </h3>
                                    <p class="text-[10px] text-slate-500 mb-3">Sélectionnez un matériel ci-dessous pour simuler un scan physique immédiat sans imprimante.</p>
                                    
                                    <div class="flex gap-2">
                                        <select 
                                            value={selectedMockQR}
                                            onChange={(e) => setSelectedMockQR(e.target.value)}
                                            class="flex-1 bg-bpm-base border border-indigo-950/80 rounded-xl px-3 py-2.5 text-xs text-slate-300 focus:outline-none focus:border-bpm-accent/60"
                                        >
                                            <option value="">-- Choisir un matériel BPM --</option>
                                            <optgroup label="Gros Matériel (Individuel)">
                                                <option value="BPM-EQ-001">Lyre Beam Spot Wash 150W (BPM-EQ-001)</option>
                                                <option value="BPM-EQ-002">Ampli Crown 2x600W (BPM-EQ-002)</option>
                                                <option value="BPM-EQ-003">Console Behringer X32 (BPM-EQ-003)</option>
                                                <option value="BPM-EQ-004">Pied Alu Renforcé (BPM-EQ-004)</option>
                                            </optgroup>
                                            <optgroup label="Caisses Vrac (Checklist)">
                                                <option value="BPM-BOX-XLR">Caisse Vrac - Câblerie Fine XLR (BPM-BOX-XLR)</option>
                                                <option value="BPM-BOX-POW">Caisse Vrac - Adaptateurs & Alims (BPM-BOX-POW)</option>
                                            </optgroup>
                                        </select>
                                        <button 
                                            onClick={() => {
                                                if (selectedMockQR) {
                                                    handleDecodedQR(selectedMockQR);
                                                }
                                            }}
                                            disabled={!selectedMockQR}
                                            class="px-4 py-2 bg-indigo-950/80 hover:bg-indigo-900 border border-indigo-800/30 rounded-xl text-xs font-bold text-bpm-neon transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                                        >
                                            Scanner
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* TAB 2: OFFLINE QUEUE & SYNC */}
                        {activeTab === "queue" && (
                            <div class="flex-1 flex flex-col gap-4">
                                <div class="flex items-center justify-between shrink-0">
                                    <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wider">File d'attente hors-ligne ({syncQueueCount})</h2>
                                    
                                    {syncQueueCount > 0 && (
                                        <button 
                                            onClick={triggerSync}
                                            disabled={!isOnline || isSyncing}
                                            class={`px-4 py-2 rounded-xl text-xs font-bold tracking-wider transition-all duration-300 flex items-center gap-1.5 ${
                                                isOnline 
                                                ? 'bg-bpm-accent text-white glow-neon' 
                                                : 'bg-indigo-950/30 text-slate-500 border border-indigo-950/20 cursor-not-allowed'
                                            }`}
                                        >
                                            {isSyncing ? (
                                                <span class="w-3.5 h-3.5 border-2 border-white border-t-transparent rounded-full animate-spin"></span>
                                            ) : 'Synchroniser'}
                                        </button>
                                    )}
                                </div>

                                {/* Queued Items List */}
                                <div class="flex-1 min-h-[150px] max-h-[300px] overflow-y-auto space-y-2 border border-indigo-950/10 p-1">
                                    {syncQueue.length === 0 ? (
                                        <div class="h-32 flex flex-col items-center justify-center text-center text-slate-600">
                                            <p class="text-xs">Aucun scan en attente</p>
                                            <p class="text-[10px] text-slate-700 mt-1">Tous les scans de terrain sont synchronisés avec la base.</p>
                                        </div>
                                    ) : (
                                        syncQueue.map((item) => (
                                            <div key={item.id} class="glass p-3 rounded-xl border-l-4 border-l-bpm-accent flex justify-between items-start">
                                                <div>
                                                    <div class="flex items-center gap-1.5">
                                                        <span class="font-bold text-xs text-white">{item.equipment_id}</span>
                                                        <span class={`text-[9px] px-1.5 py-0.5 rounded-full font-bold ${
                                                            item.action === "SORTIE" ? 'bg-bpm-accent/20 text-bpm-neon' :
                                                            item.action === "ENTRÉE" ? 'bg-emerald-500/20 text-emerald-400' : 'bg-red-500/20 text-red-400'
                                                        }`}>
                                                            {item.action}
                                                        </span>
                                                    </div>
                                                    <p class="text-[10px] text-slate-400 mt-1">Créé localement à {new Date(item.offline_created_at).toLocaleTimeString()}</p>
                                                    <p class="text-[9px] text-slate-600 font-mono mt-0.5">{JSON.parse(item.details).type === 'vrac' ? '📦 Check-list caisse de vrac validée' : '⚡ Code unique scanné'}</p>
                                                </div>
                                                <span class="text-[9px] font-bold text-bpm-neon animate-pulse bg-bpm-neon/10 px-2 py-0.5 rounded-full">OFFLINE</span>
                                            </div>
                                        ))
                                    )}
                                </div>

                                {/* Synced History */}
                                <div class="flex-1 flex flex-col gap-2">
                                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider shrink-0">Historique récent synchronisé</h3>
                                    <div class="flex-1 overflow-y-auto space-y-2 border border-indigo-950/10 p-1">
                                        {syncedHistory.length === 0 ? (
                                            <div class="h-24 flex items-center justify-center text-xs text-slate-600 text-center">
                                                Aucune transaction synchronisée dans cette session
                                            </div>
                                        ) : (
                                            syncedHistory.slice(0, 5).map((item) => (
                                                <div key={item.id} class="bg-indigo-950/10 border border-indigo-950/50 p-2.5 rounded-xl flex justify-between items-center opacity-85">
                                                    <div>
                                                        <div class="flex items-center gap-1.5">
                                                            <span class="font-semibold text-xs text-slate-300">{item.equipment_id}</span>
                                                            <span class={`text-[9px] font-bold ${
                                                                item.action === "SORTIE" ? 'text-bpm-accent' :
                                                                item.action === "ENTRÉE" ? 'text-emerald-400' : 'text-red-400'
                                                            }`}>
                                                                {item.action}
                                                            </span>
                                                        </div>
                                                        <p class="text-[9px] text-slate-500 mt-0.5">Scanné le {new Date(item.offline_created_at).toLocaleDateString()} à {new Date(item.offline_created_at).toLocaleTimeString()}</p>
                                                    </div>
                                                    <span class="text-[9px] text-emerald-400 font-bold bg-emerald-400/5 border border-emerald-400/10 px-2 py-0.5 rounded-full">SYNCRONISÉ</span>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>

                            </div>
                        )}

                        {/* TAB 3: INVENTORY */}
                        {activeTab === "inventory" && (
                            <div class="flex-1 flex flex-col gap-4">
                                <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wider shrink-0">Parc Matériel Associatif</h2>
                                
                                <div class="flex-1 overflow-y-auto space-y-2 pr-1">
                                    {equipmentList.map((item) => (
                                        <div key={item.id} class="glass p-3 rounded-xl flex justify-between items-center">
                                            <div>
                                                <div class="flex items-center gap-1.5">
                                                    <span class="font-bold text-xs text-slate-200">{item.name}</span>
                                                    <span class="text-[8px] bg-slate-800 text-slate-400 px-1.5 py-0.5 rounded font-bold">{item.category}</span>
                                                </div>
                                                <div class="flex items-center gap-3 mt-1.5 text-[10px] text-slate-500">
                                                    <span class="font-mono">{item.id}</span>
                                                    <span>•</span>
                                                    <span class="flex items-center gap-1">
                                                        <span class={`w-1.5 h-1.5 rounded-full ${item.isBulk ? 'bg-purple-400' : 'bg-blue-400'}`}></span>
                                                        {item.type}
                                                    </span>
                                                </div>
                                            </div>
                                            <span class={`text-[10px] px-2 py-0.5 rounded-full font-bold ${
                                                item.status === 'Disponible' ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' :
                                                item.status === 'En Réparation' ? 'bg-red-500/10 text-red-400 border border-red-500/20' :
                                                'bg-amber-500/10 text-amber-400 border border-amber-500/20'
                                            }`}>
                                                {item.status}
                                            </span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                    </main>

                    {/* INTERACTIVE BULK / VRAC CHECKLIST MODAL SHEET */}
                    {currentBulkBox && (
                        <div class="absolute inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-end justify-center transition-all duration-300">
                            <div class="w-full bg-bpm-surface border-t border-indigo-900 rounded-t-3xl p-5 shadow-[0_-10px_40px_rgba(0,0,0,0.8)] flex flex-col gap-4 animate-slide-up max-h-[85%]">
                                
                                {/* Modal Header */}
                                <div class="flex justify-between items-start">
                                    <div>
                                        <span class="text-[9px] bg-bpm-accent/20 text-bpm-neon px-2 py-0.5 rounded-full font-bold tracking-wider uppercase">📦 Caisse de Vrac</span>
                                        <h3 class="font-bold text-base text-white font-outfit mt-1">{currentBulkBox.name}</h3>
                                        <p class="text-[10px] text-slate-400 mt-0.5">Identifiant unique : {currentBulkBox.id}</p>
                                    </div>
                                    <button 
                                        onClick={() => { triggerHaptics(30); setCurrentBulkBox(null); }}
                                        class="w-7 h-7 rounded-full bg-slate-800/80 text-slate-400 hover:text-white flex items-center justify-center font-bold text-xs"
                                    >
                                        ✕
                                    </button>
                                </div>

                                <div class="bg-indigo-950/20 rounded-xl p-3 border border-indigo-900/30">
                                    <p class="text-[10px] text-slate-400 leading-relaxed">
                                        Vérification théorique du vrac pour une <span class="font-bold text-bpm-neon">{selectedAction}</span>. Veuillez ajuster les quantités réelles s'il manque des éléments.
                                    </p>
                                </div>

                                {/* Items list for checklist */}
                                <div class="flex-1 overflow-y-auto space-y-2.5 my-2">
                                    {bulkChecklist.map((item) => {
                                        const isDifferent = item.actual !== item.expected;
                                        return (
                                            <div key={item.id} class={`p-3 rounded-xl border flex items-center justify-between transition-colors ${
                                                isDifferent ? 'bg-amber-500/5 border-amber-500/20' : 'bg-bpm-base/50 border-indigo-950/60'
                                            }`}>
                                                <div>
                                                    <h4 class="text-xs font-bold text-slate-200">{item.name}</h4>
                                                    <span class="text-[10px] text-slate-500">Théorique : {item.expected} unités</span>
                                                </div>
                                                
                                                {/* Controls +/- */}
                                                <div class="flex items-center gap-3">
                                                    <button 
                                                        onClick={() => { triggerHaptics(20); adjustQty(item.id, -1); }}
                                                        class="w-8 h-8 rounded-lg bg-indigo-950/60 border border-indigo-900 flex items-center justify-center font-bold text-slate-300 hover:bg-indigo-900"
                                                    >
                                                        -
                                                    </button>
                                                    <span class={`w-6 text-center font-bold text-sm ${isDifferent ? 'text-amber-400' : 'text-slate-200'}`}>
                                                        {item.actual}
                                                    </span>
                                                    <button 
                                                        onClick={() => { triggerHaptics(20); adjustQty(item.id, 1); }}
                                                        class="w-8 h-8 rounded-lg bg-indigo-950/60 border border-indigo-900 flex items-center justify-center font-bold text-slate-300 hover:bg-indigo-900"
                                                    >
                                                        +
                                                    </button>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>

                                {/* Modal Actions */}
                                <div class="grid grid-cols-2 gap-3 mt-2 shrink-0">
                                    <button 
                                        onClick={() => { triggerHaptics(30); setCurrentBulkBox(null); }}
                                        class="py-3 rounded-xl border border-indigo-950 text-xs font-bold text-slate-400 hover:text-white"
                                    >
                                        ANNULER
                                    </button>
                                    <button 
                                        onClick={() => { triggerHaptics([40, 50, 100]); submitBulkChecklist(); }}
                                        class="py-3 bg-gradient-to-r from-bpm-accent to-bpm-neon text-white rounded-xl text-xs font-bold glow-neon shadow-lg"
                                    >
                                        VALIDER LE CONTENU
                                    </button>
                                </div>

                            </div>
                        </div>
                    )}

                    {/* PERSISTENT BOTTOM NAVIGATION BAR */}
                    <nav class="p-3 bg-bpm-surface/80 border-t border-indigo-950/50 flex justify-around items-center shrink-0">
                        <button 
                            onClick={() => { triggerHaptics(30); setActiveTab("scan"); }}
                            class={`flex flex-col items-center gap-1 py-1 px-3 rounded-xl transition-all duration-200 ${
                                activeTab === "scan" ? 'text-bpm-neon scale-105' : 'text-slate-500 hover:text-slate-300'
                            }`}
                        >
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m0 11v1m9-6h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m12.728 12.728l-.707.707M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            <span class="text-[10px] font-bold tracking-wide">SCANNER</span>
                        </button>

                        <button 
                            onClick={() => { triggerHaptics(30); setActiveTab("queue"); }}
                            class={`flex flex-col items-center gap-1 py-1 px-3 rounded-xl transition-all duration-200 relative ${
                                activeTab === "queue" ? 'text-bpm-neon scale-105' : 'text-slate-500 hover:text-slate-300'
                            }`}
                        >
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                            <span class="text-[10px] font-bold tracking-wide">FILE ATTENTE</span>
                            {syncQueueCount > 0 && (
                                <span class="absolute -top-1.5 right-2 bg-bpm-neon text-bpm-base font-extrabold text-[9px] w-4.5 h-4.5 rounded-full flex items-center justify-center scale-90 border border-bpm-base px-1">
                                    {syncQueueCount}
                                </span>
                            )}
                        </button>

                        <button 
                            onClick={() => { triggerHaptics(30); setActiveTab("inventory"); }}
                            class={`flex flex-col items-center gap-1 py-1 px-3 rounded-xl transition-all duration-200 ${
                                activeTab === "inventory" ? 'text-bpm-neon scale-105' : 'text-slate-500 hover:text-slate-300'
                            }`}
                        >
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
                            <span class="text-[10px] font-bold tracking-wide">STOCKS</span>
                        </button>
                    </nav>

                </div>
            );
        }

        // Rendu final
        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
